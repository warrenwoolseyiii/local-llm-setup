# =============================================================================
# LLM Server Setup Configuration
# =============================================================================
# Edit this file before running llm-server-setup.sh to customize your install.
# Lines starting with # are comments.
# =============================================================================

# --- Hostname ---
# Set a friendly hostname for this machine (used by Tailscale MagicDNS)
# Examples: rog-zephyrus, msi-gaming, llm-server-1
HOSTNAME="w_rog_0_llm_server"

# --- Ollama Configuration ---
# Host/IP that Ollama listens on. Use 0.0.0.0 to accept connections from
# other machines on the network (required for remote access).
OLLAMA_HOST="0.0.0.0"

# Port for Ollama API
OLLAMA_PORT="11434"

# Models to pull after Ollama install (space-separated).
# Leave empty to skip model pulling, or set to "interactive" to choose at runtime.
# Examples:
#   OLLAMA_MODELS="llama3.1:8b"
#   OLLAMA_MODELS="llama3.1:8b deepseek-coder-v2:16b mistral:7b"
#   OLLAMA_MODELS="interactive"
OLLAMA_MODELS="interactive"

# --- Open WebUI ---
# Set to "yes" to install Open WebUI (requires Docker)
INSTALL_OPEN_WEBUI="yes"

# Port for Open WebUI
OPEN_WEBUI_PORT="3000"

# Ollama URLs that Open WebUI should connect to (semicolon-separated).
# If running on the same machine, use the default. For multi-node setups,
# add both laptop addresses.
# Example: "http://localhost:11434;http://192.168.1.100:11434"
OPEN_WEBUI_OLLAMA_URLS="http://localhost:11434"

# --- Tailscale ---
# Set to "yes" to install Tailscale VPN
INSTALL_TAILSCALE="yes"

# --- Security ---
# Set to "yes" to configure UFW firewall
CONFIGURE_UFW="yes"

# Set to "yes" to install and enable fail2ban
INSTALL_FAIL2BAN="yes"

# Set to "yes" to disable SSH password authentication (key-only)
# WARNING: Make sure you have SSH keys set up BEFORE enabling this!
SSH_KEY_ONLY="no"

# --- NVIDIA Driver ---
# Set to "auto" to let ubuntu-drivers pick the best driver,
# or specify a version like "560" to pin it.
NVIDIA_DRIVER="auto"

# Set to "yes" to also install the CUDA toolkit
INSTALL_CUDA_TOOLKIT="no"

# --- System ---
# Services to disable for resource savings (space-separated)
DISABLE_SERVICES="snapd ModemManager bluetooth"

# Set to "yes" to configure lid-close to do nothing (for headless laptop use)
IGNORE_LID_CLOSE="yes"
